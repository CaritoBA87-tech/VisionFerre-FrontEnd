  <div class="modal fade fixed-right" id="carritoModal" tabindex="-1" role="dialog" aria-labelledby="carritoModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-aside" role="document">
    <div class="modal-content">
      <div class="modal-header border-bottom" style="background-color: #F4F4F4;">
        <h5 style="font-weight: bold;" class="modal-title fw-bold" id="carritoModalLabel">Mi carrito</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>

      <div class="modal-body" style="overflow-y: auto;">
        <div *ngIf="cart.lines.length == 0" class="text-center py-5">
          <i class="bi bi-cart-x text-muted" style="font-size: 40px;"></i>
          <p class="mt-3">Tu carrito está vacío</p>
        </div>

        <div *ngFor="let line of cart.lines" class="d-flex mb-3 pb-3 border-bottom">
            
         <!--<div class="d-flex align-items-center justify-content-center" style="padding-top: 10px; padding-right: 50px; height: 100px; overflow: hidden;">
          <img [src]="'../../assets/img/producto/' + line.producto.sku + '.jpg'" 
            class="img-fluid h-100 object-fit-contain" >
          </div>-->

          <!--Obtener imágenes desde S3-->
          <div class="d-flex align-items-center justify-content-center" style="padding-top: 10px; padding-right: 50px; height: 100px; overflow: hidden;">
          <img [src]="line.producto.imagenes[0]"
            class="img-fluid h-100 object-fit-contain" >
          </div>

          <div class="flex-grow-1">
            <h6 class="mb-0 font-weight-bold" style="font-size: 14px;">{{line.producto.nombre}}</h6>
            <small style="padding-top: 50px;" class="text-muted">SKU: {{line.producto.sku}}</small>
            
            <div class="mt-2"> <input type="number" class="form-control form-control-sm mb-2" style="width: 65px;"
         [value]="line.quantity" 
         (change)="cart.updateQuantity(line.producto, $event.target.value)">
  
  <div *ngIf="line.quantity > 1" class="small text-muted mb-1">
    {{line.producto.precio | currency}} por unidad
  </div>
  
  <div class="font-weight-bold" style="font-size: 1.1rem;">
    <span class="currency-symbol fw-bold">$</span>{{ line.subtotal | number:'1.2-2' }}
   <!-- {{line.subtotal | currency}}-->
  </div>
</div>

            <!--<div class="d-flex align-items-center mt-2">
              <input type="number" class="form-control form-control-sm mr-3" style="width: 65px;"
                     [value]="line.quantity" 
                     (change)="cart.updateQuantity(line.producto, $event.target.value)"> <br>
              <span *ngIf="line.quantity > 1">{{line.producto.precio | currency}} por unidad</span>  <br>
               <span style="font-weight:bold;">{{line.subtotal | currency}}</span>
            </div>-->
          </div>
          
          <button title="Eliminar" class="btn btn-md" style="color:grey; font-size:19px;" (click)="cart.removeLine(line.producto.idProducto)">
            <i class="bi bi-trash"></i>
          </button>
        </div>
      </div>

      <div class="modal-footer flex-column border-top bg-light">
        <div class="d-flex justify-content-center w-100 mb-3">
          <span class="h5 mb-0 mr-2">Total:</span> <span class="h5 mb-0 font-weight-bold" style="color: #CB6052;">{{cart.cartPrice | currency}}</span>
        </div>

        <button *ngIf="cart.lines.length > 0"
          [style.width]="'70%'" 
          class="btn btn-dark btn-block py-2" 
          (click)="manejarNavegacion()"
          [disabled]="cart.lines.length == 0">
          
          {{ authService.isLoggedIn() ? 'Finalizar compra' : 'Iniciar sesión para finalizar compra' }}

      </button>

        <!--<button style="width: 45%;" class="btn btn-dark btn-block py-2 font-weight-bold" routerLink="/checkout" 
                [disabled]="cart.lines.length == 0" data-dismiss="modal">
          Finalizar compra
        </button>-->

        <button style="width: 70%;" class="btn btn-outline-secondary btn-block py-2" data-dismiss="modal">
          Continuar comprando
        </button>
      </div>
    </div>
  </div>
</div>
