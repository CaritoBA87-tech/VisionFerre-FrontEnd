<header>
<div class="franja fixed-top d-flex align-items-center justify-content-between px-4">
  <div class="d-flex align-items-center gap-3">

    <a routerLink="/" style="cursor: pointer;">
    <img  src="../../assets/logo4.png" style="width: 220px;"> 
  </a>
    
    <div class="linea-vertical"></div>

    <nav class="navbar navbar-expand-lg p-0">
  <div class="container-fluid">
    <ul class="navbar-nav">
      
      <li class="nav-item dropdown">

        <button class="btn btn-custom d-flex align-items-center gap-2 nav-link dropdown-toggle" href="javascript:void(0)" 
          id="navbarDropdownMenuLink" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
          <i class="bi bi-list"></i>  &nbsp;
          <span class="fw-bold">Categorías</span>
        </button>

      <ul class="dropdown-menu shadow-lg" aria-labelledby="dropdownCategorias" style="width: 310px;">
      
        <li style="margin-bottom: 10px;"><span style="padding-left: 10%; font-size:13px; font-weight: bold;">Todas las categorías</span></li>
      
        <li *ngFor="let cat of categoriasAgrupadas let i = index" class="dropdown-submenu">
        
        <a style="font-size: 15px;" class="dropdown-item d-flex justify-content-between align-items-center" href="javascript:void(0)">
        <div class="d-flex align-items-center">
            <i [class]="'bi bi-' + icons[i % icons.length]" class="me-3"></i> 
            <span style="padding-left: 8px;">{{ cat.nombre }}</span>
          </div>
          <i class="bi bi-chevron-right small text-muted"></i>
        </a>

        <ul class="dropdown-menu">
          <li *ngFor="let sub of cat.subcategorias" style="height: 35px;">
            
            <a style="font-size: 15px;" class="dropdown-item d-flex align-items-center me-3" 
       (click)="obtenerProductosPorCategoria(cat.nombre, sub)" href="javascript:void(0)">
      {{ sub }}
    </a>

            <!--<a style="font-size: 15px;" class="dropdown-item" (click)="obtenerProductosPorCategoria(cat.nombre, sub)" href="javascript:void(0)">{{ sub }}</a>-->
          </li>
        </ul>

      </li>
    </ul>
      </li>

    </ul>
  </div>
</nav>
</div>

  <div class="buscador-container flex-grow-1 mx-5" style="max-width: 400px;">
  <div class="input-group buscador-linea">
    <input type="text" class="form-control custom-input" placeholder="Buscar un producto" aria-label="Buscar">
    <span class="input-group-text custom-icon">
      <i class="bi bi-search"></i>
    </span>
  </div>
</div>

<div class="d-flex align-items-center gap-4">
<button class="btn btn-custom d-flex align-items-center gap-2"
        style="margin-right: 40px !important;" 
        data-toggle="modal" 
        data-target="#visualizadorModal">
     &nbsp;
     <img src="../../assets/bot2.png" style="width: 22px; border-radius: 50%; background: white; padding: 2px;" class="mr-2 shadow-sm">
    <span class="fw-bold">Visualizador</span>
  </button>


<div class="dropdown user-dropdown-container ms-4">
  <a class="nav-link p-0 d-flex align-items-center dropdown-trigger" id="userMenu">
    <i class="bi bi-person icono-perfil" style="font-size: 26px; cursor: pointer;"></i>
    
    <small *ngIf="authService.isLoggedIn()" class="iconoUser mr-2 ml-1">
      <span class="small" style="font-size: 15px;">{{ authService.usuarioNombre }}</span>
    </small>
    
  </a>

  <div class="dropdown-menu dropdown-menu-right" style="font-size: 14px;">
    
    <ng-container *ngIf="authService.isLoggedIn()">
      <a class="dropdown-item" routerLink="/perfil">
        <i class="bi bi-person mr-2"></i>Mi Perfil
      </a>
      <a class="dropdown-item" routerLink="/pedidos">
        <i class="bi bi-bag mr-2"></i>Mis Pedidos
      </a>
      <div class="dropdown-divider"></div>
      <button class="dropdown-item text-danger" (click)="cerrarSesion()">
        <i class="bi bi-box-arrow-right mr-2"></i>Cerrar sesión
      </button>
    </ng-container>

    <ng-container *ngIf="!authService.isLoggedIn()">
      <a class="dropdown-item" (click)="manejarNavegacion()">
        <i class="bi bi-box-arrow-in-right mr-2"></i>Iniciar sesión
      </a>
      <a class="dropdown-item" routerLink="/registro">
        <i class="bi bi-pencil-square mr-2"></i>Registrarse
      </a>
    </ng-container>
    
  </div>
</div>

   <div class="linea-vertical-small" style="height: 30px; border-left: 1px solid; color:white;"></div>

   &nbsp; 

<div class="cart-container d-flex align-items-center gap-3" data-toggle="modal" data-target="#carritoModal" style="cursor:pointer;">
  
  <i class="bi bi-cart icono-carrito"></i>
  
  <carrito-resumen class="resumen-texto"></carrito-resumen>
  </div>
</div>
</div>
</header>
