<div class="container-fluid my-5" style="padding-top: 60px !important; background-color: #f0f2f5; font-family: 'Century Gothic', AppleGothic, sans-serif;">
<div class="row">
<div class="col-12 col-md-3 col-lg-2 mb-4">
<div class="sidebar-ferre shadow-sm sticky-top" style="top: 110px;">
  <div class="filter-header">
        <button *ngIf="filtrosSeleccionados.length > 0 || marcasSeleccionadas.length > 0" 
        (click)="limpiarFiltros()"  
        class="class=btn btn-outline-secondary btn-block py-2 btn-limpiar">
  Borrar filtros
</button>
    <!--<span class="fw-bold" style="font-size: 14px;">Filtros</span>-->
  </div>

  <div class="filter-group">
    <button style="font-size: 17px;" class="filter-collapse-btn" type="button" data-toggle="collapse" data-target="#collapseGanchos">
      Tipo
      <i class="bi bi-chevron-down"></i>
    </button>

    <div class="collapse show" id="collapseGanchos">
      <div class="filter-scroll-container">
        <div style="font-size: 15px;" *ngFor="let tipo of obtenerTipos" class="custom-control custom-checkbox my-2">
          <input type="checkbox" 
                 class="custom-control-input" 
                 [id]="tipo" 
                 (change)="toggleFiltro(tipo)">
          <label class="custom-control-label d-flex justify-content-between" [for]="tipo">
            <span>{{ tipo }}</span>
          </label>
        </div>
      </div>
    </div>
  </div>

  

  <div class="filter-group">
    <button style="font-size: 17px;" class="filter-collapse-btn" type="button" data-toggle="collapse" data-target="#collapseMarcas">
      Marca
      <i class="bi bi-chevron-down"></i>
    </button>

    <div class="collapse show" id="collapseMarcas">
      <div class="filter-scroll-container">
        <div style="font-size: 15px;" *ngFor="let marca of obtenerMarcas" class="custom-control custom-checkbox my-2">
          <input type="checkbox" 
                 class="custom-control-input" 
                 [id]="marca" 
                 (change)="toggleMarca(marca)">
          <label class="custom-control-label d-flex justify-content-between" [for]="marca">
            <span>{{ marca }}</span>
          </label>
        </div>
      </div>
    </div>
  </div>
  

</div>
</div>

<div class="col-12 col-md-9 col-lg-10">

<div class="row mb-2" style="margin-bottom: 0;">
    <div class="col-12" [innerHTML]="ruta" style="padding-left: 20px; font-size: 15px; color:423636;">
      </div>
  </div>

  <div class="row row-cols-1 row-cols-md-3 row-cols-lg-5 g-4" style=" padding-left: 10px; padding-right: 10px;">
    
    <!--<div class="col" *ngFor="let producto of listProductos"  style="padding-top: 20px; padding-left: 0px;"></div>-->
    <div class="col" *ngFor="let producto of ganchosAMostrar"  style="padding-top: 20px; padding-left: 0px; cursor: pointer;">
      <a [href]="'/producto/' + producto.idProducto" target="_blank" class="text-decoration-none text-dark">
      <div class="card h-100 product-card border-0 shadow-sm" >

        <!--<div class="d-flex align-items-center justify-content-center" style="padding-top: 10px; height: 150px; overflow: hidden;">
        <img [src]="'../../assets/img/producto/' + producto.sku + '.jpg'" 
            class="img-fluid h-100 object-fit-contain" 
            [alt]="producto.nombre">
        </div>-->

        <!--Mostrar las imágenes desde S3-->
        <div class="d-flex align-items-center justify-content-center" style="padding-top: 10px; height: 150px; overflow: hidden;">
        <img [src]="producto.imagenes[0]"
            class="img-fluid h-100 object-fit-contain" 
            [alt]="producto.nombre">
        </div>

        <div class="card-body d-flex flex-column" >
          <div class="d-flex justify-content-between mb-1">
            <small class="text-muted brand-text">{{ producto.marca }}</small>
            <small class="text-muted" >SKU: {{ producto.sku }}</small>
          </div>
          
          <h5 class="card-title product-title mb-3" style="font-size: 16px; font-weight: bold;">{{ producto.nombre }}</h5>
          
          <div class="d-flex justify-content-between align-items-center mt-3 px-3 pb-3">

          <p class="price-text">
            <span class="currency-symbol" style="font-size: 18px;">$</span>{{ producto.precio | number:'1.2-2' }}
          </p>

          <button class="btn-add-cart shadow-sm" title="Agregar al carrito" (click)="addProductToCartFerre(producto); $event.stopPropagation(); $event.preventDefault();">
        <i class="bi bi-cart-plus" style="font-size: 22px;"></i>
    </button>
    </div>

        <!--<div style="width: 100%;  align-self: center;" class="card-footer bg-white border-0 p-3">
        <button style="font-size:13px;" class="btn btn-add-cart p-2 shadow-sm" title="Agregar al carrito" (click)="addProductToCartFerre(producto)">
                <i class="bi bi-cart-plus h4 mb-0"></i>
            </button>

        </div>-->
      </div>
    </div>
    </a>
  </div>
</div>
  </div>
  </div>
  </div>
